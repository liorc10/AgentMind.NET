version: '3.8'

services:
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: agentmind-vector-db
    # Port 6333 for REST API, 6334 for gRPC (High performance)
    ports:
      - "6333:6333"
      - "6334:6334"
    # Mapping a local folder to ensure data survives after reboot or container removal
    volumes:
      - ./qdrant_data:/qdrant/storage
    # Automatically restarts the DB after Windows or Docker restart
    restart: always